services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: face-postgres
    environment:
      POSTGRES_USER: face
      POSTGRES_PASSWORD: face
      POSTGRES_DB: face-data
    ports:
      - "5432:5432"
    volumes:
      - face-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U face -d face-data"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  inspireface:
    image: ghcr.io/lipcoder/inspireface:latest
    container_name: inspireface
    platform: linux/arm64
    environment:
      FACE_FEATURES: recognition,quality,pose,emotion,liveness
      FACE_SESSION_COUNT: "2"
      FACE_SEQUENCE_MAX_FRAMES: "30"
    ports:
      - "18082:18082"
    restart: unless-stopped

  faced:
    image: face:local
    pull_policy: build
    build:
      context: .
      dockerfile: Dockerfile
    container_name: faced
    environment:
      DATABASE_URL: postgres://face:face@postgres:5432/face-data?sslmode=disable
      INSPIREFACE_HOST: http://inspireface:18082
    ports:
      - "5090:5090"
    depends_on:
      postgres:
        condition: service_healthy
      inspireface:
        condition: service_started
    restart: unless-stopped

volumes:
  face-data:
    external: true
    name: face-data
