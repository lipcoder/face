services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: face-postgres
    environment:
      POSTGRES_USER: face
      POSTGRES_PASSWORD: face
      POSTGRES_DB: face-data
    ports:
      - "5432:5432"
    volumes:
      - face-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U face -d face-data"]
      interval: 5s
      timeout: 5s
      retries: 10

  faced:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSPIREFACE_SDK_IMAGE: inspireface-cgo-check:latest
    container_name: faced
    environment:
      HTTP_ADDR: :5090
      DATABASE_URL: postgres://face:face@postgres:5432/face-data?sslmode=disable
      INSPIREFACE_PACK_PATH: /opt/models/Megatron
    ports:
      - "5090:5090"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  face-data:
