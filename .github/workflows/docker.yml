name: Docker

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  INSPIREFACE_REPO: HyperInspire/InspireFace
  INSPIREFACE_VERSION: v1.2.3
  INSPIREFACE_MODEL_RELEASE: v1.x
  INSPIREFACE_MODEL: Megatron

jobs:
  prepare:
    name: Prepare metadata
    runs-on: ubuntu-24.04

    outputs:
      image: ${{ steps.meta.outputs.image }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Set image metadata
        id: meta
        run: |
          IMAGE="${REGISTRY}/${GITHUB_REPOSITORY,,}"
          VERSION="${GITHUB_REF_NAME#v}"

          if [[ -z "$VERSION" ]]; then
            echo "Version is empty"
            exit 1
          fi

          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.arch }}
    needs: prepare

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
            suffix: amd64
            sdk_asset_arch: x86-manylinux2014

          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
            sdk_asset_arch: aarch64

    runs-on: ${{ matrix.runner }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download InspireFace release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eux

          SDK_VERSION="${INSPIREFACE_VERSION#v}"
          SDK_ASSET="inspireface-linux-${{ matrix.sdk_asset_arch }}-${SDK_VERSION}.zip"

          rm -rf docker-assets
          mkdir -p docker-assets/downloads

          gh release download "${INSPIREFACE_VERSION}" \
            --repo "${INSPIREFACE_REPO}" \
            --pattern "${SDK_ASSET}" \
            --dir docker-assets/downloads

          gh release download "${INSPIREFACE_MODEL_RELEASE}" \
            --repo "${INSPIREFACE_REPO}" \
            --pattern "${INSPIREFACE_MODEL}" \
            --dir docker-assets/downloads

          test -s "docker-assets/downloads/${SDK_ASSET}"
          test -s "docker-assets/downloads/${INSPIREFACE_MODEL}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push ${{ matrix.platform }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.version }}-${{ matrix.suffix }}

  manifest:
    name: Create multi-arch manifest
    needs:
      - prepare
      - build

    runs-on: ubuntu-24.04

    permissions:
      packages: write

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Create manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.version }} \
            ${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.version }}-amd64 \
            ${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.version }}-arm64

      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect \
            ${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.version }}
