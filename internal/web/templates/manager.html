<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>人脸库管理</title>
  <style>
    body { margin: 0; background: #f6f7f9; color: #1f2937; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    main { max-width: 1120px; margin: 0 auto; padding: 20px; display: grid; grid-template-columns: minmax(0, 1fr) 320px; gap: 18px; }
    h1 { margin: 0 0 14px; font-size: 24px; }
    .stage { position: relative; width: 100%; aspect-ratio: 4 / 3; background: #111827; overflow: hidden; border-radius: 8px; }
    video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; }
    .panel { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 14px; display: flex; flex-direction: column; gap: 12px; }
    label { display: block; font-size: 13px; color: #4b5563; margin-bottom: 5px; }
    input { width: 100%; box-sizing: border-box; padding: 9px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; }
    button { border: 0; border-radius: 6px; padding: 10px 12px; background: #2563eb; color: #fff; font-size: 14px; cursor: pointer; }
    button.secondary { background: #4b5563; }
    button.danger { background: #dc2626; }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .status { min-height: 22px; font-size: 13px; color: #374151; }
    .names { font-size: 13px; line-height: 1.6; color: #374151; max-height: 260px; overflow: auto; border-top: 1px solid #e5e7eb; padding-top: 10px; }
    @media (max-width: 860px) { main { grid-template-columns: 1fr; padding: 12px; } }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>人脸库管理</h1>
      <div class="stage">
        <video id="video" autoplay playsinline muted></video>
      </div>
    </section>
    <aside class="panel">
      <div>
        <label for="name">姓名</label>
        <input id="name" autocomplete="off" placeholder="输入姓名">
      </div>
      <button id="add">采集 25 帧并添加</button>
      <div class="row">
        <button id="search" class="secondary">查询</button>
        <button id="delete" class="danger">删除</button>
      </div>
      <button id="refresh" class="secondary">刷新列表</button>
      <div id="status" class="status"></div>
      <div id="names" class="names"></div>
    </aside>
  </main>
  <script>
    const video = document.getElementById('video');
    const statusEl = document.getElementById('status');
    const namesEl = document.getElementById('names');
    const nameInput = document.getElementById('name');
    const captureCanvas = document.createElement('canvas');
    const captureCtx = captureCanvas.getContext('2d');

    function setStatus(text) { statusEl.textContent = text || ''; }
    function nameValue() { return nameInput.value.trim(); }
    function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

    async function startCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
      video.srcObject = stream;
      await video.play();
      resizeCaptureCanvas();
    }

    function resizeCaptureCanvas() {
      captureCanvas.width = video.videoWidth || 640;
      captureCanvas.height = video.videoHeight || 480;
    }

    async function frameBlob() {
      if (!video.videoWidth || !video.videoHeight) return null;
      if (captureCanvas.width !== video.videoWidth || captureCanvas.height !== video.videoHeight) resizeCaptureCanvas();
      captureCtx.drawImage(video, 0, 0, captureCanvas.width, captureCanvas.height);
      return new Promise(resolve => captureCanvas.toBlob(resolve, 'image/jpeg', 0.85));
    }

    async function addFace() {
      const name = nameValue();
      if (!name) { setStatus('请输入姓名'); return; }
      const button = document.getElementById('add');
      button.disabled = true;
      setStatus('正在采集 25 帧...');
      try {
        const form = new FormData();
        form.append('name', name);
        for (let i = 0; i < 25; i++) {
          const blob = await frameBlob();
          if (!blob) throw new Error('无法采集画面');
          form.append('frames', blob, 'frame_' + String(i + 1).padStart(3, '0') + '.jpg');
          await sleep(40);
        }
        const res = await fetch('/api/faces/add', { method: 'POST', body: form });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '添加失败');
        setStatus('已添加 ' + data.name + '，ID ' + data.id);
        await refreshNames();
      } catch (err) {
        setStatus(err.message);
      } finally {
        button.disabled = false;
      }
    }

    async function postJSON(url, body) {
      const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '请求失败');
      return data;
    }

    async function searchFace() {
      const name = nameValue();
      if (!name) { setStatus('请输入姓名'); return; }
      try {
        const data = await postJSON('/api/faces/search', { name });
        setStatus(data.exists ? name + ' 已存在' : name + ' 不存在');
      } catch (err) { setStatus(err.message); }
    }

    async function deleteFace() {
      const name = nameValue();
      if (!name) { setStatus('请输入姓名'); return; }
      try {
        await postJSON('/api/faces/delete', { name });
        setStatus('已删除 ' + name);
        await refreshNames();
      } catch (err) { setStatus(err.message); }
    }

    async function refreshNames() {
      const res = await fetch('/api/faces/list');
      const data = await res.json();
      const names = data.names || [];
      namesEl.innerHTML = names.length ? names.map(n => '<div>' + escapeHTML(n) + '</div>').join('') : '暂无人脸';
    }

    function escapeHTML(value) {
      return String(value).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    document.getElementById('add').addEventListener('click', addFace);
    document.getElementById('search').addEventListener('click', searchFace);
    document.getElementById('delete').addEventListener('click', deleteFace);
    document.getElementById('refresh').addEventListener('click', refreshNames);

    startCamera().then(refreshNames).catch(err => setStatus(err.message));
    window.addEventListener('resize', resizeCaptureCanvas);
  </script>
</body>
</html>
